<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Bài 3</title>
  </head>
  <body>
    <script>
      console.log("Các số từ 1 đến 20:");

      for (let i = 1; i <= 20; i++) {
        console.log(i);
      }

      let tong = 0;

      for (let i = 1; i <= 20; i++) {
        tong += i;
      }

      console.log("Tổng từ 1 đến 20 là:", tong);

      console.log("Các số chẵn:");

      for (let i = 2; i <= 20; i += 2) {
        console.log(i);
      }
    </script>
  </body>
</html>
