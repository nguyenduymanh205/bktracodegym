<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xếp loại điểm</title>
  </head>
  <body>
    <!doctype html>
    <html lang="vi">
      <head>
        <meta charset="UTF-8" />
        <title>Bài 2</title>
      </head>
      <body>
        <script>
          let diem = parseFloat(prompt("Nhập điểm:"));

          if (diem >= 8) {
            console.log("Giỏi");
          } else if (diem >= 6.5) {
            console.log("Khá");
          } else if (diem >= 5) {
            console.log("Trung bình");
          } else {
            console.log("Yếu");
          }
        </script>
      </body>
    </html>
  </body>
</html>
